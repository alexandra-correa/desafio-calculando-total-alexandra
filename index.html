<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculando el Total</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="card">

        <img src="./img/notebook.png" alt="Laptop Gamer">

        <h3>Laptop Gamer AMD</h3>

        <p>
            Precio base:
            $<span id="precio">400000</span>
        </p>

        <div class="contador">

            <button id="btnMenos">-</button>

            <span id="cantidad">0</span>

            <button id="btnMas">+</button>

        </div>

    </div>

    <div class="total">

        <h2>
            Total a pagar:
            $<span id="total">0</span>
        </h2>

    </div>

    <!-- JAVASCRIPT -->
    <script src="./js/script.js"></script>

</body>

</html>
